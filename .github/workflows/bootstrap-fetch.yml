# TEMPORARY bootstrap workflow — fetches https://chatmail.at/relays from a
# GitHub runner and dumps it (base64) into the job log so the parser fixture
# can be built from real HTML. Will be removed before this branch is finalized.
name: bootstrap-fetch
on:
  workflow_dispatch:
  push:
    branches: [claude/chatmail-relays-mirror-nhgavn]
    paths: [.github/workflows/bootstrap-fetch.yml]
permissions:
  contents: read
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch page and dump to log
        run: |
          set -x
          status=$(curl -sSL \
            -A "chatmail-relays-mirror (github.com/${{ github.repository }})" \
            -o relays.html \
            -w '%{http_code}' \
            https://chatmail.at/relays) || true
          echo "HTTP_STATUS=$status"
          wc -c relays.html || true
          echo "===BEGIN_BASE64==="
          base64 -w0 relays.html || true
          echo ""
          echo "===END_BASE64==="
